<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Transactions - Finance Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page-header">
        <h1>Transactions</h1>
        <div class="header-actions"><button class="btn btn-primary" onclick="openModal()">+ Add Transaction</button></div>
      </div>
      <div class="card" style="margin-bottom:16px">
        <div class="filters">
          <div class="form-group"><label>Type</label><select class="form-control" id="f-type" onchange="loadTx()"><option value="">All</option><option value="income">Income</option><option value="expense">Expense</option></select></div>
          <div class="form-group"><label>Category</label><select class="form-control" id="f-cat" onchange="loadTx()"><option value="">All</option></select></div>
          <div class="form-group"><label>From</label><input type="date" class="form-control" id="f-start" onchange="loadTx()"></div>
          <div class="form-group"><label>To</label><input type="date" class="form-control" id="f-end" onchange="loadTx()"></div>
          <div class="form-group"><label>Search</label><input type="text" class="form-control" id="f-search" placeholder="Search descriptions..." oninput="debounceSearch()"></div>
        </div>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table><thead><tr><th>Date</th><th>Description</th><th>Category</th><th>Type</th><th>Amount</th><th>Receipt</th><th style="width:100px">Actions</th></tr></thead><tbody id="tx-tbody"><tr><td colspan="7"><div class="loading-overlay"><div class="spinner"></div></div></td></tr></tbody></table>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
          <span id="tx-info" style="color:var(--text-muted);font-size:.8rem"></span>
          <div style="display:flex;gap:6px"><button class="btn btn-outline btn-sm" id="prev-btn" onclick="prevPage()" disabled>← Prev</button><button class="btn btn-outline btn-sm" id="next-btn" onclick="nextPage()">Next →</button></div>
        </div>
      </div>
    </main>
  </div>
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h2 id="modal-title">Add Transaction</h2>
      <form id="tx-form">
        <input type="hidden" id="tx-id">
        <div class="form-row">
          <div class="form-group"><label>Type</label><select class="form-control" id="tx-type" required onchange="loadCatOpts()"><option value="expense">Expense</option><option value="income">Income</option></select></div>
          <div class="form-group"><label>Category</label><select class="form-control" id="tx-cat"></select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Amount</label><input type="number" step="0.01" class="form-control" id="tx-amount" placeholder="0.00" required></div>
          <div class="form-group"><label>Currency</label><select class="form-control" id="tx-currency"><option>USD</option><option>EUR</option><option>GBP</option><option>INR</option><option>JPY</option><option>CAD</option><option>AUD</option></select></div>
        </div>
        <div class="form-group"><label>Date</label><input type="date" class="form-control" id="tx-date" required></div>
        <div class="form-group"><label>Description</label><input type="text" class="form-control" id="tx-desc" placeholder="What was this for?" maxlength="500"></div>
        <div class="form-group"><label>Receipt (image or PDF)</label><input type="file" class="form-control" id="tx-receipt" accept="image/*,.pdf"></div>
        <div class="modal-actions"><button type="button" class="btn btn-outline" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Save Transaction</button></div>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script>
    let categories=[],page=0,limit=20,searchTimer;
    async function init(){const u=await initPage('transactions');if(!u)return;const d=await api('/categories');categories=d.categories;populateFilterCats();loadTx()}
    function populateFilterCats(){document.getElementById('f-cat').innerHTML='<option value="">All Categories</option>'+categories.map(c=>`<option value="${c.id}">${c.name} (${c.type})</option>`).join('')}
    function loadCatOpts(){const t=document.getElementById('tx-type').value;document.getElementById('tx-cat').innerHTML='<option value="">— Select —</option>'+categories.filter(c=>c.type===t).map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
    function debounceSearch(){clearTimeout(searchTimer);searchTimer=setTimeout(loadTx,300)}
    async function loadTx(){
      const p=new URLSearchParams();const t=document.getElementById('f-type').value;if(t)p.set('type',t);const c=document.getElementById('f-cat').value;if(c)p.set('category_id',c);const s=document.getElementById('f-start').value;if(s)p.set('start_date',s);const e=document.getElementById('f-end').value;if(e)p.set('end_date',e);const q=document.getElementById('f-search').value;if(q)p.set('search',q);p.set('limit',limit);p.set('offset',page*limit);
      try{
        const d=await api(`/transactions?${p}`);const tb=document.getElementById('tx-tbody');
        if(!d.transactions.length){tb.innerHTML='<tr><td colspan="7"><div class="empty-state"><div class="icon">📝</div><p>No transactions found</p></div></td></tr>';}
        else{tb.innerHTML=d.transactions.map(t=>`<tr><td>${formatDate(t.date)}</td><td>${t.description||'—'}</td><td>${t.category_name||'—'}</td><td><span class="badge badge-${t.type}">${t.type}</span></td><td style="color:var(--${t.type}-color);font-weight:600">${t.type==='expense'?'- ':'+ '}${formatCurrency(parseFloat(t.amount),t.currency)}</td><td>${t.receipt_path?`<a href="/api/transactions/${t.id}/receipt" target="_blank" class="btn btn-outline btn-sm btn-icon">📎</a>`:'—'}</td><td><div style="display:flex;gap:4px"><button class="btn btn-outline btn-sm btn-icon" onclick="editTx(${t.id})">✏️</button><button class="btn btn-danger btn-sm btn-icon" onclick="deleteTx(${t.id})">🗑</button></div></td></tr>`).join('')}
        document.getElementById('tx-info').textContent=`${Math.min(page*limit+1,d.total)}–${Math.min((page+1)*limit,d.total)} of ${d.total}`;document.getElementById('prev-btn').disabled=page===0;document.getElementById('next-btn').disabled=(page+1)*limit>=d.total;
      }catch(err){showToast(err.message,'error')}
    }
    function prevPage(){page--;loadTx()}function nextPage(){page++;loadTx()}
    function openModal(tx=null){document.getElementById('tx-id').value=tx?tx.id:'';document.getElementById('modal-title').textContent=tx?'Edit Transaction':'Add Transaction';document.getElementById('tx-type').value=tx?tx.type:'expense';loadCatOpts();if(tx)setTimeout(()=>document.getElementById('tx-cat').value=tx.category_id||'',50);document.getElementById('tx-amount').value=tx?tx.amount:'';document.getElementById('tx-currency').value=tx?tx.currency:'USD';document.getElementById('tx-date').value=tx?new Date(tx.date).toISOString().split('T')[0]:new Date().toISOString().split('T')[0];document.getElementById('tx-desc').value=tx?tx.description:'';document.getElementById('modal').classList.add('active')}
    function closeModal(){document.getElementById('modal').classList.remove('active')}
    document.getElementById('tx-form').onsubmit=async e=>{e.preventDefault();const id=document.getElementById('tx-id').value;const b={type:document.getElementById('tx-type').value,amount:parseFloat(document.getElementById('tx-amount').value),currency:document.getElementById('tx-currency').value,date:document.getElementById('tx-date').value,description:document.getElementById('tx-desc').value};const cv=document.getElementById('tx-cat').value;if(cv)b.category_id=parseInt(cv);try{if(id){await api(`/transactions/${id}`,{method:'PUT',body:b})}else{const r=await api('/transactions',{method:'POST',body:b});const f=document.getElementById('tx-receipt').files[0];if(f){const fd=new FormData();fd.append('receipt',f);await api(`/transactions/${r.transaction.id}/receipt`,{method:'POST',body:fd})}}showToast(id?'Updated':'Created');closeModal();loadTx()}catch(err){showToast(err.message,'error')}};
    async function editTx(id){try{const d=await api(`/transactions/${id}`);openModal(d.transaction)}catch(err){showToast(err.message,'error')}}
    async function deleteTx(id){if(!confirm('Delete this transaction?'))return;try{await api(`/transactions/${id}`,{method:'DELETE'});showToast('Deleted');loadTx()}catch(err){showToast(err.message,'error')}}
    init();
  </script>
</body>
</html>
