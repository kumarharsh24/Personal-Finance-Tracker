<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Personal Finance Tracker</title>
  <meta name="description" content="Track your income, expenses and investments smartly">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <h1>💰 <span class="logo-gradient">Finance Tracker</span></h1>
        <p class="subtitle">Take control of your money. Track, analyze, grow.</p>
        <div class="auth-tabs">
          <button class="active" onclick="showTab('login')">Sign In</button>
          <button onclick="showTab('register')">Create Account</button>
        </div>
        <div id="alert"></div>
        <form id="login-form">
          <div class="form-group"><label>Email Address</label><input type="email" class="form-control" id="login-email" placeholder="you@example.com" required></div>
          <div class="form-group"><label>Password</label><input type="password" class="form-control" id="login-password" placeholder="••••••••" required></div>
          <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">Sign In →</button>
        </form>
        <form id="register-form" style="display:none">
          <div class="form-group"><label>Full Name</label><input type="text" class="form-control" id="reg-name" placeholder="John Doe"></div>
          <div class="form-group"><label>Email Address</label><input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required></div>
          <div class="form-group"><label>Password</label><input type="password" class="form-control" id="reg-password" placeholder="Min 6 characters" required minlength="6"></div>
          <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">Create Account →</button>
        </form>
        <div class="auth-divider">or continue with</div>
        <a href="/api/auth/google" class="btn btn-google btn-block">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615Z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18Z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.997 8.997 0 0 0 0 9s0 0 .957 4.042l3.007-2.332Z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58Z"/></svg>
          Google
        </a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    checkAuth().then(u=>{if(u)window.location.href='/dashboard.html'});
    function showTab(t){
      document.querySelectorAll('.auth-tabs button').forEach(b=>b.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('login-form').style.display=t==='login'?'block':'none';
      document.getElementById('register-form').style.display=t==='register'?'block':'none';
      document.getElementById('login-email').required=t==='login';
      document.getElementById('login-password').required=t==='login';
      document.getElementById('reg-email').required=t==='register';
      document.getElementById('reg-password').required=t==='register';
      document.getElementById('alert').innerHTML='';
    }
    function showAlert(m,t='error'){document.getElementById('alert').innerHTML=`<div class="alert alert-${t}">${m}</div>`}
    document.getElementById('login-form').onsubmit=async e=>{e.preventDefault();try{await api('/auth/login',{method:'POST',body:{email:document.getElementById('login-email').value,password:document.getElementById('login-password').value}});window.location.href='/dashboard.html'}catch(err){showAlert(err.message)}};
    document.getElementById('register-form').onsubmit=async e=>{e.preventDefault();try{await api('/auth/register',{method:'POST',body:{name:document.getElementById('reg-name').value,email:document.getElementById('reg-email').value,password:document.getElementById('reg-password').value}});window.location.href='/dashboard.html'}catch(err){showAlert(err.message)}};
  </script>
</body>
</html>
