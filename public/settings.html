<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Settings - Finance Tracker</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <main class="main">
      <div class="page-header"><h1>Settings</h1></div>
      <div class="grid-2">
        <div class="card">
          <div class="card-header"><h3>👤 Profile</h3></div>
          <form id="profile-form">
            <div class="form-group"><label>Name</label><input type="text" class="form-control" id="s-name" placeholder="Your name"></div>
            <div class="form-group"><label>Email</label><input type="email" class="form-control" id="s-email" disabled style="opacity:.6"></div>
            <div class="form-group"><label>Preferred Currency</label><select class="form-control" id="s-currency"><option>USD</option><option>EUR</option><option>GBP</option><option>INR</option><option>JPY</option><option>CAD</option><option>AUD</option></select></div>
            <div class="form-group"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input type="checkbox" id="s-notif" style="width:auto;accent-color:var(--primary)"> Email notifications for budget alerts</label></div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>
        <div class="card">
          <div class="card-header"><h3>📂 Categories</h3></div>
          <div id="cat-list" style="max-height:280px;overflow-y:auto;margin-bottom:16px"></div>
          <div class="divider"></div>
          <form id="cat-form" style="display:flex;gap:8px;align-items:end">
            <div class="form-group" style="flex:1;margin:0"><label>New Category</label><input type="text" class="form-control" id="cat-name" placeholder="Category name" required></div>
            <div class="form-group" style="margin:0"><label>Type</label><select class="form-control" id="cat-type"><option value="expense">Expense</option><option value="income">Income</option></select></div>
            <button type="submit" class="btn btn-primary" style="margin-bottom:0;height:39px">Add</button>
          </form>
        </div>
      </div>
      <div class="card" style="margin-top:16px">
        <div class="card-header"><h3>🤖 AI Configuration</h3></div>
        <div id="ai-status"><div class="loading-overlay" style="padding:16px"><div class="spinner"></div></div></div>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/sidebar.js"></script>
  <script>
    async function init(){
      const u=await initPage('settings');if(!u)return;
      document.getElementById('s-name').value=u.name||'';document.getElementById('s-email').value=u.email;document.getElementById('s-currency').value=u.preferred_currency||'USD';document.getElementById('s-notif').checked=u.notification_email!==false;
      loadCategories();checkAI();
    }
    document.getElementById('profile-form').onsubmit=async e=>{e.preventDefault();try{await api('/auth/profile',{method:'PUT',body:{name:document.getElementById('s-name').value,preferred_currency:document.getElementById('s-currency').value,notification_email:document.getElementById('s-notif').checked}});showToast('Profile saved')}catch(err){showToast(err.message,'error')}};
    async function loadCategories(){
      try{const d=await api('/categories');
        document.getElementById('cat-list').innerHTML=d.categories.length?d.categories.map(c=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)"><span style="display:flex;align-items:center;gap:8px"><span class="badge badge-${c.type}">${c.type}</span><span style="font-size:.88rem">${c.name}</span></span><button class="btn btn-danger btn-sm btn-icon" onclick="deleteCat(${c.id})" title="Delete">×</button></div>`).join(''):'<div class="empty-state"><p>No categories</p></div>'
      }catch(err){showToast(err.message,'error')}
    }
    document.getElementById('cat-form').onsubmit=async e=>{e.preventDefault();try{await api('/categories',{method:'POST',body:{name:document.getElementById('cat-name').value,type:document.getElementById('cat-type').value}});document.getElementById('cat-name').value='';showToast('Added');loadCategories()}catch(err){showToast(err.message,'error')}};
    async function deleteCat(id){if(!confirm('Delete? Transactions keep data but lose the category label.'))return;try{await api(`/categories/${id}`,{method:'DELETE'});showToast('Deleted');loadCategories()}catch(err){showToast(err.message,'error')}}
    async function checkAI(){try{const d=await api('/ai/status');document.getElementById('ai-status').innerHTML=d.configured?'<div class="alert alert-success">✅ OpenAI connected. AI features (spending analysis, financial advice, auto-categorization) are active.</div>':'<div class="alert alert-warning">⚠️ OpenAI not configured. Add <code style="background:var(--bg-input);padding:2px 6px;border-radius:4px">OPENAI_API_KEY</code> to your <code style="background:var(--bg-input);padding:2px 6px;border-radius:4px">.env</code> file to enable AI features.</div>'}catch{document.getElementById('ai-status').innerHTML='<div class="alert alert-error">Could not check AI status</div>'}}
    init();
  </script>
</body>
</html>
